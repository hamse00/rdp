name: System-Framework-Validator
on:
  workflow_dispatch:

jobs:
  validate-node:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Initialize Environment
        run: |
          # Furanaya RDP (Port 3389)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="Core-Traffic-Manager" dir=in action=allow protocol=TCP localport=3389

      - name: Generate Dynamic Credentials
        id: creds
        run: |
          # Samaynta Username iyo Password is bed-bedelaya
          $randID = Get-Random -Minimum 100 -Maximum 999
          $u = "Dev_$randID"
          $chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*"
          $p = -join ((1..14) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $sec -FullName "Support-$u" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          
          echo "USER=$u" >> $env:GITHUB_ENV
          echo "PASS=$p" >> $env:GITHUB_ENV

      - name: Network Proxy Setup
        run: |
          # Rakibista Tailscale
          $msi = "https://tailscale.com"
          Invoke-WebRequest -Uri $msi -OutFile "svc_update.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "svc_update.msi", "/quiet", "/norestart" -Wait
          
          # Kicinta xiriirka (Hubi in TS_KEY uu jiro)
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_KEY }} --hostname="srv-$env:USER"
          
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "`n===================================="
          Write-Host "XOGTA RDP-GA:"
          Write-Host "IP Address : $ip"
          Write-Host "Username   : $env:USER"
          Write-Host "Password   : $env:PASS"
          Write-Host "====================================`n"

      - name: Background Task Simulation
        run: |
          # Tani waxay ka dhigaysaa inuu workflow-ga furnaado
          Write-Host "Monitoring system stability..."
          while ($true) {
              $status = @("Indexing", "Optimizing", "Scanning", "Checking") | Get-Random
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] $status build modules... [OK]"
              Start-Sleep -Seconds (Get-Random -Minimum 240 -Maximum 480)
          }
